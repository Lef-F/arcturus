name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same branch
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Typecheck + Lint + Test
    # ARM runner (GitHub-hosted) — matches target deployment environment
    runs-on: ubuntu-24.04-arm

    env:
      # Signal test random exploration depth (1000 locally, 10000 in deep job)
      SIGNAL_TEST_DEPTH: "1000"

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  # Extended signal tests — runs more random combos for deeper coverage
  signal-deep:
    name: Deep Signal Tests
    runs-on: ubuntu-24.04-arm
    # Only on main pushes and non-draft PRs — skip for quick iteration
    if: github.event_name == 'push' || !github.event.pull_request.draft

    env:
      SIGNAL_TEST_DEPTH: "2500"  # per-process; 4 parallel = 10000 total

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deep signal tests (2 × 5000 in parallel)
        run: |
          mkdir -p /tmp/signal-results
          FAILED=0
          for i in 1 2; do
            (sleep "0.$((i-1))" && \
             SIGNAL_TEST_DEPTH=5000 npx vitest run src/test/audio-signal.test.ts \
             > /tmp/signal-results/worker-$i.log 2>&1; \
             echo $? > /tmp/signal-results/worker-$i.exit) &
          done
          wait

          echo "══════════════════════════════════════════"
          echo "Signal Test Summary"
          echo "══════════════════════════════════════════"
          for i in 1 2; do
            EXIT=$(cat /tmp/signal-results/worker-$i.exit 2>/dev/null || echo "?")
            STATS=$(grep "Tests" /tmp/signal-results/worker-$i.log | tail -1)
            echo "Worker $i (exit=$EXIT): $STATS"
            # Show any NaN warnings
            grep "\[signal-test\] NaN" /tmp/signal-results/worker-$i.log || true
            if [ "$EXIT" != "0" ]; then FAILED=1; fi
          done
          echo "══════════════════════════════════════════"

      - name: Upload signal test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: signal-test-logs
          path: /tmp/signal-results/
          retention-days: 7
